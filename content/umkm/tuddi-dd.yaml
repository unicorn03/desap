nama: TUDDi D&D
pemilik: Bu Tatni
kategori: Makanan
deskripsi: >-
  TUDDi D&D merupakan UMKM yang bergerak di bidang makanan ringan sejak tahun
  2016. Produk yang dihasilkan meliputi keripik jamur, kerupuk pare, keripik
  pisang, dan kentang mustofa, dengan produk unggulan berupa keripik jamur.
  Produk dipasarkan melalui sistem titip di toko, WhatsApp, TikTok, dan Shopee
  sehingga dapat menjangkau konsumen secara lebih luas.  
jam_operasional: 24 Jam
