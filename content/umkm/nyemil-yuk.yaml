nama: Nyemil Yuk by Zain
pemilik: Bu Eva
kategori: Makanan
deskripsi: >-
  Nyemil Yuk by Zain merupakan UMKM yang berdiri sejak tahun 2024 dan bergerak
  di bidang makanan beku (frozen food) serta camilan siap saji. Produk yang
  ditawarkan meliputi dimsum, cireng isi, mie, basreng, cimol, dan risol frozen
  food, dengan produk unggulan berupa dimsum frozen, cireng isi, dan mie. Selain
  melayani pembelian langsung, UMKM ini juga menerima delivery order dengan
  ongkos kirim yang menyesuaikan lokasi pelanggan. Produk risol frozen juga
  dapat dibeli melalui Frozen Food Wlingi.  
jam_operasional: 10.00 - 20.00 WIB
lokasi: Teras Alfamidi Majegan, Wlingi dan depan SMPN 2 Wlingi, Kabupaten Blitar
kontak_wa: '085694484016'
