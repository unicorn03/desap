nama: Sambal Shaddai
pemilik: Bu Elisa
kategori: Makanan
deskripsi: >-
  Sambal Shaddai merupakan UMKM yang berdiri sejak tahun 2023 dan memproduksi
  berbagai jenis sambal, seperti sambal cumi, sambal bawang, sambal petai, dan
  varian sambal lainnya. Produk dijual dengan kisaran harga Rp20.000–Rp28.000
  dan dipasarkan melalui WhatsApp, Instagram, TikTok, serta Shopee.  
jam_operasional: Senin - Sabtu. Pukul 09.00 - 17.00 WIB
lokasi: Precet, Plumbangan, Kec. Doko, Kabupaten Blitar, Jawa Timur 66186
